<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML FORM</title>
</head>
<body>
   <h1>Registration Form</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <label for ="fname">First name</label>
            <Input type="text" name="fname" id="fname" required></Input>
            <br><br>
            <label for="lname">Last name</label>
            <Input type="text" name="lname" id="lname" required></Input>
            <br><br>
            <label for="email">Email</label>
            <Input type="email" name="email" id="email" required></Input>
            <br><br>
            <label for="phone">Phone Number</label>
            <Input type="number" name="phone" id="phone" required></Input>
             <br><br>
             <label for="dob">Date of birth:</label><br>
            <Input type="date" name="dob" id="dob" required></Input>
            <br><br>
            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="Male">
            <label for="male"> Male</label>
            <input type="radio" id="female" name="gender" value="Female">
            <label for="female"> Female</label>
            <input type="radio" id="other" name="gender" value="Other">
            <label for="other"> Other </label>
        </fieldset>
        <br><br>
       
        <fieldset>
            <legend>Deparment and Semester Information</legend>
            <label for ="department">Department:</label><br>
            <select id="department" name="department">
            <option value="CSE" selected>CSE</option>
            <option value="EEE">EEE</option>
            <option value="CS">CS</option>
            <option value="Pharmacy">Pharmacy</option>
            <option value="Biotechnology">Biotechnology</option>
            <option value="BBA">BBA</option>
            
            </select>
            <br><br>

            <label for ="semester">Semester:</label><br>
            <select id="semester" name="semester">
            <option value="1st">1st semester</option>
            <option value="2nd">2nd semester</option>
            <option value="3rd">3rd semester</option>
            <option value="4th">4th semester</option>
            <option value="5th">5th semester</option>
            <option value="6th">6th semester</option>
            <option value="7th">7th semester</option>
            <option value="8th">8th semester</option>
            </select>

        </fieldset>
<br><br>
      <fieldset>
        <legend> Programming Skills</legend>
        <input type="checkbox" id="c" name="language" value=" C">
        <label for="c">C</label><br>
        <input type="checkbox" id="cpp" name="language" value=" C++">
        <label for="cpp">C++</label><br>
        <input type="checkbox" id="java" name="language" value="Java">
        <label for="java">Java</label><br>
        <input type="checkbox" id="python" name="language" value="Python">
        <label for="python">Python</label><br>
        <input type="checkbox" id="javascript" name="language" value="JavaScript">
        <label for="javascript">JavaScript</label><br>
        <input type="checkbox" id="csharp" name="language" value="C#">
        <label for="csharp">C#</label><br>
        <input type="checkbox" id="sql" name="language" value="SQL">
        <label for="sql">SQL</label><br>

      </fieldset> 
        
 <fieldset>
    <legend> Address and Extra Information</legend>
    <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" cols="40"></textarea>
            <br><br>
            <label for="photo">Upload Student Photo:</label><br>
            <input type="file" id="photo" name="photo">
            <br><br>
 </fieldset>
 <input type="Submit" value="Submit">
 <input type="Reset" value="Reset">
    </form> 
</body>
</html>
