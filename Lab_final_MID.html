<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Technology Workshop</title>
    <link rel="stylesheet" href="LAB_FINAL_MID.css">
</head>
<body>
    <div class="container">

        <h2>Professional Registration Form</h2>
                <form id="regForm">

            <label for="name">First Name</label>
            <input type="text" id="name" placeholder="Enter your first name">
            <small id="nameError" class="error"></small>

            <label for="name">Last Name</label>
            <input type="text" id="name" placeholder="Enter your last name">
            <small id="nameError" class="error"></small>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="example@gmail.com">
            <small id="emailError" class="error"></small>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
            <small id="passwordError" class="error"></small>

                <label>Gender</label>

                <div class="radio-group">

                <input type="radio" id="male" name="gender" value="Male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                </div>

                <small id="genderError" class="error"></small>

                <label>Interests</label>

                <div class="checkbox-group">

                <input type="checkbox" id="html" name="interests" value="HTML">
                <label for="html">HTML</label>

                <input type="checkbox" id="java" name="interests" value="JAVA">
                <label for="java">JAVA</label>

                <input type="checkbox" id="c++" name="interests" value="C++">
                <label for="c++">C++</label>

                <input type="checkbox" id="js" name="interests" value="JAVASCRIPT">
                <label for="js">JAVASCRIPT</label>

                 </div>

                <small id="interestsError" class="error"></small>

                <label for="department">Department</label>

                <select id="department">
                <option value="">Select Department</option>
                <option value="CSE">CSE</option>
                <option value="EEE">EEE</option>
                <option value="BBA">BBA</option>
                <option value="English">English</option>
                </select>

                <small id="departmentError" class="error"></small>

                <label for="aboutyourself">About Yourself</label>

                <textarea id="aboutyourself" rows="4"
                placeholder="Write about yourself:"></textarea>

                <small id="aboutyourselfError" class="error"></small>

                 <button type="submit">Submit</button>

        </form>

    </div>

    <script src="LAB_final_MID.js"></script>

</body>
</html>
